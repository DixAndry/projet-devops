---
name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  backend-test:
    name: Backend FastAPI Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Python files
        run: |
          cd backend
          python -m compileall .


  frontend-build:
    name: Frontend React Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build React
        run: |
          cd frontend
          npm run build


  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
          -f backend/Dockerfile.prod \
          -t dixandry/projet-devops-backend:latest \
          ./backend

      - name: Build frontend image
        run: |
          docker build \
          -f frontend/Dockerfile.prod \
          -t dixandry/projet-devops-frontend:latest \
          ./frontend

      - name: Push backend image
        run: |
          docker push dixandry/projet-devops-backend:latest

      - name: Push frontend image
        run: |  
          docker push dixandry/projet-devops-frontend:latest
  

  deploy:
      name: Deploy to Debian
      runs-on: self-hosted
      needs: docker-build

      steps:
         - name: Deploy application
           run: |
            cd /home/dix/Documents/newproject
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f